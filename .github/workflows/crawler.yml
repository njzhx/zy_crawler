name: 政策爬虫定时执行

on:
  schedule:
    # 北京时间凌晨3点整（UTC时间前一天19:00）
    - cron: '0 19 * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # 强制使用 Node.js 24 运行 GitHub Actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: Set timezone to Beijing (UTC+8)
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          date
      
      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装 Google Chrome (绕过 Snap 限制)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget fonts-liberation libnss3 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: 执行爬虫
        run: python crawler_manager.py
        env:
          # Supabase 环境变量（需要在 GitHub 仓库设置 Secrets）
          SUPABASE_PROJECT_API: ${{ secrets.SUPABASE_PROJECT_API }}
          SUPABASE_ANON_PUBLIC: ${{ secrets.SUPABASE_ANON_PUBLIC }}
          # 飞书机器人 Webhook（需要在 GitHub 仓库设置 Secrets）
          FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
      
      - name: 输出执行结果
        if: always()
        run: echo "爬虫执行完成，请查看上方日志"
